name: Proto Generation

on:
  push:
    paths:
      - "proto/**/*.proto"

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout proto repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Setup Protobuf
        uses: arduino/setup-protoc@v3
        with:
          version: "34.1"

      - name: Install generators
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest

      - name: Generate Go code
        run: |
          export PATH="$PATH:$(go env GOPATH)/bin"
          protoc -I ./proto \
            --go_out=. --go_opt=module=github.com/arslanmaratbekov/ap2-assignment2 \
            --go-grpc_out=. --go-grpc_opt=module=github.com/arslanmaratbekov/ap2-assignment2 \
            proto/payment/v1/payment.proto \
            proto/order/v1/order.proto

      - name: Push generated code to Repository B
        env:
          GENERATED_REPO_PAT: ${{ secrets.GENERATED_REPO_PAT }}
        run: |
          echo "Configure this step to clone your generated-code repository and push pkg/gen there."
