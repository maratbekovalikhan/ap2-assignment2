name: ci

on:
  push:
  pull_request:

jobs:
  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Show forge version
        run: forge --version

      - name: Build
        run: forge build

      - name: Test
        run: forge test -vvv

      - name: Format check
        run: forge fmt --check

      - name: Coverage
        run: forge coverage --report summary

  slither:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
      - name: Install slither
        run: pip install slither-analyzer
      - name: Run slither
        run: slither . --filter-paths "lib|test|script"
